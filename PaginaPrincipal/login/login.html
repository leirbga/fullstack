<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToDoApp - Log In</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans min-h-screen flex flex-col justify-between">

  <!-- NAVBAR -->
  <header class="bg-white shadow-sm py-4 px-8 flex justify-between items-center">
    <div class="text-2xl font-extrabold text-gray-900 tracking-tight">
      <a href="#" class="hover:text-blue-600 transition">ToDoApp</a>
    </div>
    <div>
      <a href="register.html" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-6 py-2 rounded-full shadow-md transition duration-200">
        Sign Up
      </a>
    </div>
  </header>

  <!-- LOGIN CONTAINER -->
  <main class="flex-grow flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl border border-gray-100 p-8">
      
      <!-- Encabezado del Formulario -->
      <div class="text-center mb-8">
        <h2 class="text-3xl font-black text-blue-600 mb-2">Welcome Back</h2>
        <p class="text-gray-500 text-sm">Please enter your details to sign in</p>
      </div>

      <!-- Formulario -->
      <form action="#" method="POST" class="space-y-5">
        
        <!-- Email -->
        <div>
          <label for="email" class="block text-sm font-semibold text-gray-700 mb-1.5">Email Address</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            placeholder="you@example.com" 
            required
            class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:border-blue-500 focus:bg-white transition text-gray-800 placeholder-gray-400"
          >
        </div>

        <!-- Contraseña -->
        <div>
          <div class="flex justify-between items-center mb-1.5">
            <label for="password" class="text-sm font-semibold text-gray-700">Password</label>
            <a href="#" class="text-xs font-semibold text-blue-600 hover:underline">Forgot password?</a>
          </div>
          <input 
            type="password" 
            id="password" 
            name="password" 
            placeholder="••••••••" 
            required
            class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:border-blue-500 focus:bg-white transition text-gray-800 placeholder-gray-400"
          >
        </div>

        <!-- Botón de Envío -->
        <button 
          type="submit" 
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-blue-500/20 transition duration-200 text-center block mt-2"
        >
          Sign In
        </button>
      </form>

      <!-- Enlace alternativo -->
      <div class="text-center mt-6 text-sm text-gray-500">
        Don't have an account? 
        <a href="register.html" class="font-bold text-blue-600 hover:underline">Sign up for free</a>
      </div>

    </div>
  </main>

  <!-- FOOTER -->
  <footer class="py-6 text-center text-xs text-gray-500 border-t border-gray-100">
    © 2026 — Developed by <span class="font-medium text-gray-700">Eileen Valera</span> y <span class="font-medium text-gray-700">Aaron Valera</span>
  </footer>

</body>
</html>
